services:
  postgres:
    image: postgres:16-alpine
    container_name: car_hire_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: car_hire_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: car_hire_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build: .
    container_name: car_hire_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    ports:
      - '5000:5000'
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
